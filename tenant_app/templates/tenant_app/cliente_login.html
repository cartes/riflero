<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión — {{ tienda.nombre_tienda }}</title>
    <meta name="robots" content="noindex" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>body { font-family: "Inter", sans-serif; }</style>
  </head>
  <body class="min-h-screen bg-gray-50 flex flex-col">

    <!-- Header white-label -->
    <header class="bg-white border-b border-gray-200">
      <div class="max-w-md mx-auto px-4 py-4 flex items-center justify-between">
        <a href="/" class="text-xl font-bold text-gray-900 hover:text-indigo-600 transition-colors">
          {{ tienda.nombre_tienda }}
        </a>
      </div>
    </header>

    <!-- Card central -->
    <main class="flex-1 flex items-center justify-center px-4 py-12">
      <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

          <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-indigo-50 mb-4">
              <svg class="w-6 h-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Iniciar sesión</h1>
            <p class="mt-1 text-sm text-gray-500">para comprar en <strong>{{ tienda.nombre_tienda }}</strong></p>
          </div>

          {% if error %}
          <div class="mb-6 rounded-xl bg-red-50 border border-red-200 p-4 flex items-start gap-3">
            <svg class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd"
                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                clip-rule="evenodd" />
            </svg>
            <p class="text-sm text-red-700">{{ error }}</p>
          </div>
          {% endif %}

          <form method="POST" action="" class="space-y-5">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}" />

            <div>
              <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                Correo electrónico
              </label>
              <input type="email" id="email" name="email" required autocomplete="email"
                class="block w-full px-4 py-3 border border-gray-200 rounded-xl shadow-sm placeholder-gray-400
                       focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                       transition-all sm:text-sm bg-gray-50"
                placeholder="tu@email.com" />
            </div>

            <div>
              <div class="flex items-center justify-between mb-1">
                <label for="password" class="block text-sm font-medium text-gray-700">
                  Contraseña
                </label>
              </div>
              <input type="password" id="password" name="password" required autocomplete="current-password"
                class="block w-full px-4 py-3 border border-gray-200 rounded-xl shadow-sm placeholder-gray-400
                       focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                       transition-all sm:text-sm bg-gray-50"
                placeholder="Tu contraseña" />
            </div>

            <button type="submit"
              class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm
                     text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700
                     focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
              Iniciar sesión
            </button>
          </form>

          <p class="mt-6 text-center text-sm text-gray-500">
            ¿No tienes cuenta?
            <a href="/cliente/registro/?next={{ next }}"
              class="font-semibold text-indigo-600 hover:text-indigo-700 transition-colors">
              Crear cuenta gratis
            </a>
          </p>

        </div>

        <p class="mt-6 text-center text-xs text-gray-400">
          <a href="/" class="hover:text-indigo-500 transition-colors">← Volver al catálogo</a>
        </p>
      </div>
    </main>

    <!-- Footer white-label -->
    <footer class="bg-white border-t border-gray-100 py-4">
      <p class="text-center text-xs text-gray-400">
        &copy; 2026 {{ tienda.nombre_tienda }}.
        <a href="https://riflero.cl" class="hover:text-indigo-500 transition-colors ml-1">Tecnología por Riflero.cl</a>
      </p>
    </footer>

  </body>
</html>
